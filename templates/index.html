<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTunes — Music for Your Mood</title>
    <meta name="description" content="Discover music tailored to your mood with AI-powered recommendations and Spotify integration.">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Decorative background blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <span class="logo-icon">🎵</span>
                <div class="header-text">
                    <h1>MoodTunes</h1>
                    <p>Music <em>just for your</em> mood</p>
                </div>
            </div>
            <div class="header-right">
                <div id="spotify-auth-container"></div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-box" id="chat-box">
            <div class="message bot-message fade-in">
                <div class="avatar bot-avatar">🎧</div>
                <div class="bubble">
                    <p class="greeting-big">Discover,<br><em>Create, Enjoy</em></p>
                    <p class="greeting-sub">Tell me how you're feeling and I'll find the perfect soundtrack ✨</p>
                </div>
            </div>
        </main>

        <!-- Typing Indicator -->
        <div class="typing-indicator hidden" id="typing-indicator">
            <div class="avatar bot-avatar">🎧</div>
            <div class="bubble typing-bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="How are you feeling today?" autocomplete="off" required />
                <button type="submit" id="send-btn" title="Send">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Template for track cards -->
    <template id="track-card-template">
        <div class="track-card">
            <div class="track-art-wrapper">
                <img class="track-img" src="" alt="Album Art">
                <button class="preview-btn" title="Preview" style="display: none;">
                    <svg class="play-icon" viewBox="0 0 24 24" width="18" height="18" fill="white">
                        <polygon points="5,3 19,12 5,21"></polygon>
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" width="18" height="18" fill="white" style="display:none;">
                        <rect x="5" y="3" width="4" height="18"></rect>
                        <rect x="15" y="3" width="4" height="18"></rect>
                    </svg>
                </button>
                <div class="preview-progress">
                    <div class="preview-progress-bar"></div>
                </div>
            </div>
            <div class="track-info">
                <div class="track-title"></div>
                <div class="track-artist"></div>
                <div class="track-reason"></div>
            </div>
            <a href="" class="spotify-link" target="_blank" title="Open in Spotify">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#1DB954">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.299 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.781-.18-.6.18-1.2.78-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
            </a>
        </div>
    </template>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
