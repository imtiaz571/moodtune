<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTunes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        window.FIREBASE_CONFIG = {{ firebase_config | tojson | safe }};
    </script>
</head>
<body class="landing-mode">
    <canvas id="glcanvas"></canvas>
    
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo" style="text-decoration: none;">
                    <span class="logo-text" style="color: #ffffff;">Mood<span style="color: #1DB954;">Tunes</span></span>
                </a>
                <button id="sidebar-collapse-btn" class="collapse-btn desktop-only" title="Close sidebar">
                    <svg class="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <polyline points="13 8 17 12 13 16"></polyline>
                    </svg>
                    <svg class="icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <polyline points="17 8 13 12 17 16"></polyline>
                    </svg>
                </button>
                <button id="mobile-menu-close" class="hamburger-btn mobile-only" style="display: none;">&times;</button>
            </div>
            
            <button id="new-chat-btn" class="new-chat-btn">
                <span class="icon">+</span>
                <span class="text">New Chat</span>
            </button>
            
            <div class="search-container">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-chats" placeholder="Search chats...">
            </div>
            
            <div class="recent-chats-container">
                <h3 class="section-title">Recent Chats</h3>
                <div id="chat-history-list" class="chat-list">
                    <!-- Dynamic chat items will go here -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div id="auth-container" class="firebase-auth-container">
                    <button id="firebase-login-btn" class="auth-btn google-auth-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" class="google-logo"> Continue with Google
                    </button>
                    <button id="firebase-logout-btn" class="auth-btn google-auth-btn" style="display: none;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" class="google-logo"> Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <div class="app-layout">
            <header class="app-header" style="display: flex; justify-content: space-between; padding: 20px; align-items: center; width: 100%; box-sizing: border-box;">
                <button id="mobile-menu-btn" class="hamburger-btn mobile-only" style="display: none;">☰</button>
                <div style="flex: 1;"></div>
                <div class="auth-buttons" style="display: flex; gap: 10px; align-items: center;">
                    <div id="spotify-auth-container" class="spotify-auth-container">
                        <!-- Will be populated by JS -->
                    </div>
                </div>
            </header>

            <main class="main-content">
            <div class="landing-hero" id="landing-hero">
                <h1 class="hero-green">How can I help you<br>find music today?</h1>
            </div>

            <div class="chat-area hidden" id="chat-area">
                <div class="chat-box" id="chat-box">
                    <!-- Chat messages will go here -->
                    
                    <div class="typing-indicator hidden" id="typing-indicator">
                        <div class="bubble typing-bubble">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-wrapper" id="input-wrapper">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="" autocomplete="off" required />
                    <button type="submit" id="send-btn" title="Send">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 10 4 15 9 20"></polyline>
                            <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                        </svg>
                    </button>
                </form>
            </div>

            <div class="preset-chips-container" id="preset-chips-container">
                <div class="preset-chips">
                    <button class="preset-chip">Feeling super happy!</button>
                    <button class="preset-chip">A bit stressed, need to relax</button>
                    <button class="preset-chip">Nostalgic for the past</button>
                    <button class="preset-chip">Just want some chill vibes</button>
                </div>
            </div>
        </main>
    </div>
    </div>
    
    <!-- Template for track cards (hidden) -->
    <template id="track-card-template">
        <div class="track-card">
            <div class="track-art-wrapper">
                <img class="track-img" src="" alt="Album Art">
                <button class="preview-btn" title="Preview" style="display: none;">
                    <svg class="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="white">
                        <polygon points="5,3 19,12 5,21"></polygon>
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="white" style="display:none;">
                        <rect x="5" y="3" width="4" height="18"></rect>
                        <rect x="15" y="3" width="4" height="18"></rect>
                    </svg>
                </button>
                <div class="preview-progress">
                    <div class="preview-progress-bar"></div>
                </div>
            </div>
            <div class="track-info">
                <div class="track-title"></div>
                <div class="track-artist"></div>
                <div class="track-reason"></div>
            </div>
            <a href="" class="spotify-link" target="_blank" title="Open in Spotify">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#1DB954">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.299 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.781-.18-.6.18-1.2.78-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
            </a>
        </div>
    </template>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
    
    <script src="{{ url_for('static', filename='js/background.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
